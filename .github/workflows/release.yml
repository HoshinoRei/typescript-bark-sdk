name: Release
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (for example: 0.6.3)"
        required: true
        type: string
jobs:
  release:
    name: Release to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - name: Run prepublish gates
        run: deno task prepublish
      - name: Publish to JSR
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            deno publish --set-version "${{ inputs.version }}"
          else
            deno publish
          fi
