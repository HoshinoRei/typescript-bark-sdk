name: Release
on:
  release:
    types:
      - published
jobs:
  release:
    name: Release to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - name: Run prepublish gates
        run: deno task prepublish
      - name: Publish to JSR
        run: deno publish
